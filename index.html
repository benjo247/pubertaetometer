  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --card: #13131f;
      --card2: #1a1a2e;
      --accent1: #ff3cac;
      --accent2: #784ba0;
      --accent3: #2b86c5;
      --neon: #00f5d4;
      --boy1: #3a86ff;
      --boy2: #0077b6;
      --girl1: #ff3cac;
      --girl2: #d62598;
      --text: #f0f0f8;
      --muted: #888aaa;
      --radius: 20px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 16px 60px;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 520px; height: 520px;
      background: radial-gradient(circle, var(--accent1), transparent 70%);
      top: -100px; left: -100px;
      animation: blobA 12s ease-in-out infinite alternate;
    }
    body::after {
      width: 420px; height: 420px;
      background: radial-gradient(circle, var(--accent3), transparent 70%);
      bottom: -80px; right: -80px;
      animation: blobB 10s ease-in-out infinite alternate;
    }
    @keyframes blobA { to { transform: translate(60px, 80px) scale(1.1); } }
    @keyframes blobB { to { transform: translate(-40px, -60px) scale(1.15); } }

    .everything { position: relative; z-index: 1; width: 100%; max-width: 480px; }

    /* LANG TOGGLE */
    .lang-toggle {
      display: flex; gap: 8px;
      justify-content: flex-end;
      margin-bottom: 24px;
      margin-top: 8px;
    }
    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--muted);
      color: var(--muted);
      border-radius: 50px;
      padding: 5px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: .5px;
    }
    .lang-btn.active {
      border-color: var(--neon);
      color: var(--neon);
      background: rgba(0,245,212,.08);
    }

    /* HEADER */
    .header { text-align: center; margin-bottom: 36px; }
    .header .emoji-row {
      font-size: 42px;
      line-height: 1;
      margin-bottom: 12px;
      display: block;
      animation: floatY 3s ease-in-out infinite;
    }
    @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2.2rem, 8vw, 3.4rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent1) 0%, #ff8a00 50%, var(--neon) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      letter-spacing: -1px;
    }
    .header p {
      color: var(--muted);
      font-size: 15px;
      margin-top: 10px;
      line-height: 1.5;
    }

    /* CARD */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 24px;
      border: 1px solid rgba(255,255,255,.07);
      margin-bottom: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }

    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* GENDER SELECT */
    .gender-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .gender-btn {
      background: var(--card2);
      border: 2px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 22px 12px 18px;
      cursor: pointer;
      transition: all .25s cubic-bezier(.34,1.56,.64,1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;

      font-size: 44px;

    }
    .gender-btn:hover { transform: translateY(-3px); }
    .gender-btn.selected-boy {
      border-color: var(--boy1);
      background: rgba(58,134,255,.12);
      box-shadow: 0 0 20px rgba(58,134,255,.25), inset 0 0 20px rgba(58,134,255,.06);

    .gender-btn.selected-girl {
      border-color: var(--girl1);
      background: rgba(255,60,172,.12);
      box-shadow: 0 0 20px rgba(255,60,172,.25), inset 0 0 20px rgba(255,60,172,.06);
    }
    .gender-btn.selected-girl .big-icon { transform: scale(1.15) rotate(5deg); }

    /* CHECK BUTTON */
    .check-section { margin-top: 8px; }
    .check-btn {
      width: 100%;
      padding: 20px;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s;
      background: linear-gradient(135deg, var(--accent1), #ff8a00);
      color: white;
      letter-spacing: -.3px;
      box-shadow: 0 8px 30px rgba(255,60,172,.35);
    }
    .check-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .check-btn:hover { transform: translateY(-3px) scale(1.01); box-shadow: 0 14px 40px rgba(255,60,172,.45); }
    .check-btn:hover::before { opacity: 1; }
    .check-btn:active { transform: scale(.97); }
    .check-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .check-btn .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }
    .check-btn .spin { display: none; animation: spin .7s linear infinite; }
    .check-btn.loading .spin { display: inline-block; }
    .check-btn.loading .btn-label { opacity: .6; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* RESULT */
    .result-card {
      display: none;
      opacity: 0;
      transform: translateY(30px) scale(.97);
      transition: all .5s cubic-bezier(.34,1.56,.64,1);
    }
    .result-card.visible {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    /* METER */
    .meter-wrap { margin: 8px 0 20px; }
    .meter-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;

    .meter-label { font-size: 13px; color: var(--muted); font-weight: 500; }
    .meter-value {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent1), #ff8a00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;

    .meter-value.boy-color {
      background: linear-gradient(135deg, var(--boy1), var(--neon));

      background-clip: text;
    }
    .meter-value.girl-color {
      background: linear-gradient(135deg, var(--girl1), #ff8a00);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .meter-track {
      width: 100%;
      height: 12px;
      background: rgba(255,255,255,.08);
      border-radius: 100px;
      overflow: hidden;
    }
    .meter-fill {
      height: 100%;
      width: 0%;
      border-radius: 100px;
      transition: width 1.2s cubic-bezier(.25,.46,.45,.94);
    }
    .meter-fill.boy-fill { background: linear-gradient(90deg, var(--boy1), var(--neon)); }
    .meter-fill.girl-fill { background: linear-gradient(90deg, var(--girl1), #ff8a00); }

    /* LEVEL BADGE */

      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px;

    .level-2 { background: rgba(58,134,255,.15); color: var(--boy1); border: 1px solid rgba(58,134,255,.3); }
    .level-3 { background: rgba(255,138,0,.15); color: #ff8a00; border: 1px solid rgba(255,138,0,.3); }
    .level-4 { background: rgba(255,60,172,.15); color: var(--accent1); border: 1px solid rgba(255,60,172,.3); }

      font-family: 'Syne', sans-serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      font-weight: 800;
      margin-bottom: 12px;

      line-height: 1.65;

    /* AGAIN BUTTON */
    .again-btn {

      color: var(--muted);

      font-weight: 700;
      cursor: pointer;

    .again-btn:hover {

    /* FUN PARTICLES */

    /* CONFETTI shimmer on high score */

    }

    /* Divider */
    .divider {
      height: 1px;
      background: rgba(255,255,255,.06);
      margin: 20px 0;
    }
  </style>
</head>

          { max: 100, emoji: '🚀', title: 'ULTRA-PUBERTY ACTIVATED!', text: 'LEGEND! You hit Level 100! Your hormones are on overdrive and you\'re an absolute powerhouse of energy, feelings and wild ideas. The world is yours! You\'re officially the Puberty Champion 🏅. Your future is so bright you need shades. LETS GOOO! 🎉' }
        ]
      },
      girl: {
        ranges: [
          { max: 15, emoji: '🌸', title: 'Still in princess mode!', text: 'Your hormones are taking a little siesta. You\'re living worry-free in your bubble – no drama, no emotional rollercoasters. Calm as a lake... but the wind is coming! Enjoy this peaceful phase, you little ray of sunshine! 💫' },
          { max: 30, emoji: '🌺', title: 'The transformation begins!', text: 'Something is happening... Your body is tapping you on the shoulder saying: "Hey, we\'re starting now!" Sometimes you feel super happy, sometimes mega annoyed – by everything. That\'s totally normal! You\'re becoming something truly special! 🌟' },
          { max: 50, emoji: '🎢', title: 'Rollercoaster mode activated!', text: 'One minute you\'re crying at a commercial, the next you\'re laughing at everything. Welcome to the wildest rollercoaster no theme park could ever build! Your body is doing the most complex upgrade ever. Your feelings are like a rainbow – intense, colorful and absolutely beautiful! 🌈' },
          { max: 75, emoji: '💅', title: 'Advanced puberty player!', text: 'You\'re checking your style, you know what you want, and your own opinion matters more than your parents\' 😄. Friendships are becoming everything to you and you\'re developing your own superpower personality. Your crew sticks together and you\'re on your way to absolutely slaying! 🎶' },
          { max: 90, emoji: '✨', title: 'Almost fully transformed!', text: 'Wow, you\'ve almost mastered the wild phase! You know who you are, what you want, and you can manage your feelings so much better now. Your friendships are deep and meaningful. You\'re becoming the strongest version of yourself. The world is prepared – are you? 👑' },
          { max: 100, emoji: '🦋', title: 'COMPLETE TRANSFORMATION!', text: 'WOAH! Level 100! You\'re a butterfly emerging from its cocoon! 🦋 You\'ve conquered puberty like an absolute Queen! Your energy, your confidence, your personality – all on point! The world is waiting for you and you are more than ready. GO GET IT, QUEEN! 👑🎉' }
        ]
      }
    }
  };

  function setLang(l) {
    lang = l;
    document.getElementById('btn-de').classList.toggle('active', l === 'de');
    document.getElementById('btn-en').classList.toggle('active', l === 'en');
    updateUI();
  }

  function updateUI() {
    const t = T[lang];
    document.getElementById('title').textContent = t.title;
    document.getElementById('subtitle').textContent = t.subtitle;
    document.getElementById('label-gender').textContent = t.labelGender;
    document.getElementById('label-boy').textContent = t.labelBoy;
    document.getElementById('label-girl').textContent = t.labelGirl;
    document.getElementById('btn-label').textContent = t.btnLabel;
    document.getElementById('again-btn').textContent = t.againBtn;
    document.getElementById('label-puberty-level').textContent = t.labelPubertyLevel;
    document.getElementById('footer-text').innerHTML = t.footer;
  }

  function selectGender(g) {
    gender = g;
    document.getElementById('btn-boy').className = 'gender-btn' + (g === 'boy' ? ' selected-boy' : '');
    document.getElementById('btn-girl').className = 'gender-btn' + (g === 'girl' ? ' selected-girl' : '');
    document.getElementById('check-btn').disabled = false;
  }

  function getLevelIndex(score) {
    if (score <= 15) return 0;
    if (score <= 30) return 1;
    if (score <= 60) return 2;
    if (score <= 80) return 3;
    return 4;
  }

  function getRange(score, gender) {
    const ranges = T[lang][gender].ranges;
    for (const r of ranges) { if (score <= r.max) return r; }
    return ranges[ranges.length - 1];
  }

  function doCheck() {
    const btn = document.getElementById('check-btn');
    btn.disabled = true;
    btn.classList.add('loading');
    document.getElementById('btn-label').textContent = T[lang].btnLoading;
    document.getElementById('result-card').classList.remove('visible');
    document.getElementById('result-card').style.display = 'none';

    // dramatic pause
    setTimeout(() => {
      const score = Math.floor(Math.random() * 100) + 1;
      trackResult(score, gender, lang);
      showResult(score);
      btn.classList.remove('loading');
      btn.disabled = false;
      document.getElementById('btn-label').textContent = T[lang].btnLabel;
    }, 1800);
  }

  function showResult(score) {
    const t = T[lang];
    const range = getRange(score, gender);
    const levelIdx = getLevelIndex(score);

    // set values
    document.getElementById('score-display').textContent = score;
    document.getElementById('result-emoji').textContent = range.emoji;
    document.getElementById('result-title').textContent = range.title;
    document.getElementById('result-text').textContent = range.text;
    document.getElementById('level-name').textContent = t.levels[levelIdx];

    // level badge
    const badge = document.getElementById('level-badge');
    badge.className = 'level-badge level-' + (levelIdx + 1);

    // color by gender
    const mv = document.getElementById('score-display');
    const mf = document.getElementById('meter-fill');
    mv.className = 'meter-value ' + (gender === 'boy' ? 'boy-color' : 'girl-color');
    mf.className = 'meter-fill ' + (gender === 'boy' ? 'boy-fill' : 'girl-fill');

    // high score shimmer
    const rc = document.getElementById('result-card');
    rc.classList.toggle('high-score', score >= 90);

    // show
    rc.style.display = 'block';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        rc.classList.add('visible');
        // animate meter
        setTimeout(() => {
          document.getElementById('meter-fill').style.width = score + '%';
        }, 200);
        // animate score counter
        animateCounter(score);
        // scroll to result
        setTimeout(() => rc.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
        // particles
        if (score >= 70) spawnParticles(score);
      });
    });
  }

  function animateCounter(target) {
    const el = document.getElementById('score-display');
    let current = 0;
    const step = target / 40;
    const interval = setInterval(() => {
      current = Math.min(current + step, target);
      el.textContent = Math.round(current);
      if (current >= target) clearInterval(interval);
    }, 30);
  }

  function spawnParticles(score) {
    const emojis = score >= 90
      ? ['🎉','🔥','🚀','⭐','✨','💥','🏆','👑']
      : ['⚡','🌟','✨','🎯','💫','🔥'];
    const count = score >= 90 ? 14 : 7;
    for (let i = 0; i < count; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left = (20 + Math.random() * 60) + 'vw';
        p.style.top = (50 + Math.random() * 30) + 'vh';
        p.style.animationDelay = Math.random() * 0.3 + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 1800);
      }, i * 80);
    }
  }

  function resetAll() {
    gender = null;
    document.getElementById('btn-boy').className = 'gender-btn';
    document.getElementById('btn-girl').className = 'gender-btn';
    document.getElementById('check-btn').disabled = true;
    const rc = document.getElementById('result-card');
    rc.classList.remove('visible', 'high-score');
    rc.style.display = 'none';
    document.getElementById('meter-fill').style.width = '0%';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  updateUI();
</script>
</body>
</html>
